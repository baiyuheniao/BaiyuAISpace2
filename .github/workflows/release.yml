# CD：推送 v* 标签时，自动在三个平台打安装包并创建 GitHub Release（草稿）
# 用法：git tag v0.1.0 && git push origin v0.1.0
# 打完后到 GitHub Releases 页面检查草稿，确认没问题再手动发布
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04 # AppImage
            args: ''
          - platform: windows-latest # NSIS 安装包
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS 双架构交叉编译需要预装两个 target，其他平台无副作用
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # tauri-action 会自动执行 beforeBuildCommand（pnpm build）、
      # 打包 tauri.conf.json 里声明的 targets，并把产物挂到 Release
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BaiyuAISpace ${{ github.ref_name }}'
          releaseBody: '各平台安装包见下方 Assets。Windows 用 .exe（NSIS），macOS 用 .dmg，Linux 用 .AppImage。'
          releaseDraft: true
          # 带 “-” 的标签（如 v0.2.0-beta.1）自动标为预发布版本
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
