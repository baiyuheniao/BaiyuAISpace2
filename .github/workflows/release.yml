# CD：推送 v* 标签时，自动在三个平台打安装包并创建 GitHub Release（草稿）
# Windows 额外附带一份便携版单文件 exe（未打包的原始二进制，免安装双击运行）
# 用法：git tag v0.1.0 && git push origin v0.1.0
# 打完后到 GitHub Releases 页面检查草稿，确认没问题再手动发布
# 手动发布后会触发 publish-update-manifest.yml，把 latest.json 同步到应用内自动更新用的固定端点
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04 # AppImage
            args: ''
          - platform: windows-latest # NSIS 安装包
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS 双架构交叉编译需要预装两个 target，其他平台无副作用
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Annotated Tag 的正文就是人工确认过的更新说明。把它直接带进草稿 Release，
      # 避免构建完成后只剩安装包说明、漏写本次实际更新内容。
      - name: Prepare release notes from annotated tag
        id: release-notes
        shell: pwsh
        run: |
          $tagNotes = (git for-each-ref "refs/tags/$env:GITHUB_REF_NAME" --format="%(contents)" | Out-String).Trim()
          if ([string]::IsNullOrWhiteSpace($tagNotes)) {
            $tagNotes = "更新内容：`n`n- 请在发布前补充本次更新内容。"
          }
          $body = @"
          $tagNotes

          各平台安装包见下方 Assets。Windows 提供 .exe 安装包（NSIS）和便携版单文件 exe（免安装，双击运行），macOS 用 .dmg，Linux 用 .AppImage。
          "@
          "body<<RELEASE_BODY_EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body.Trim() | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "RELEASE_BODY_EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # tauri-action 会自动执行 beforeBuildCommand（pnpm build）、
      # 打包 tauri.conf.json 里声明的 targets，并把产物挂到 Release
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 给更新包签名，供 tauri-plugin-updater 校验；同时触发生成 latest.json
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BaiyuAISpace ${{ github.ref_name }}'
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: true
          # 带 “-” 的标签（如 v0.2.0-beta.1）自动标为预发布版本
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      # tauri-action 打包前会先编译出未打包的原始二进制（前端资源已编译期嵌入，
      # 单文件即可运行，仅依赖系统自带的 WebView2 Runtime）；这里改名后追加上传到同一个 Release
      - name: Upload portable exe (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Copy-Item "src-tauri/target/release/BaiyuAISpace2.exe" "BaiyuAISpace-${{ github.ref_name }}-portable.exe"
          gh release upload ${{ github.ref_name }} "BaiyuAISpace-${{ github.ref_name }}-portable.exe" --clobber
