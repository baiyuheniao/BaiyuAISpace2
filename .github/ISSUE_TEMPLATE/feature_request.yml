name: "\U0001F4A1 功能建议"
description: 提出一个新功能或改进建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢建议！不确定是否算“功能建议”的想法，也欢迎先到 [Discussions](https://github.com/baiyuheniao/BaiyuAISpace2/discussions) 聊聊。

  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题
      description: 先说场景和痛点，再说方案——同一个痛点可能有更好的解法
      placeholder: "例如：我经常需要把同一个问题发给多个模型对比回答，现在只能手动切换配置逐个发送……"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的功能 / 交互方式
      placeholder: "例如：聊天输入框旁增加「多模型并发」开关，勾选多个 API 配置后同一条消息并排显示各模型回答"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案（可选）

  - type: textarea
    id: extra
    attributes:
      label: 补充信息（可选）
      description: 参考的其他产品、截图、链接等
